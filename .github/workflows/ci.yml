name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check . && uv run ruff format --check .

      - name: Types (mypy)
        run: uv run mypy src

      - name: Test (pytest)
        run: uv run pytest
