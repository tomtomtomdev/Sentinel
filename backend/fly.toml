# Sentinel on Fly.io — the backend API + scheduler worker as two process groups
# sharing one managed Postgres (PLAN §6). Deploy from this directory:
#
#   cd backend && fly deploy
#
# See the README "Deploy › Fly.io" runbook for the full first-time setup
# (app creation, Postgres attach, and the required secrets). The SPA is served
# same-origin by the compose nginx image for self-host; a Fly SPA deploy is a
# separate app (runbook note).

# Placeholder name — `fly launch` will pick/confirm a globally-unique one.
app = "sentinel"
primary_region = "sin"

[build]
  # fly.toml lives in backend/, so the build context is backend/ and this is
  # backend/Dockerfile (the same image compose builds).
  dockerfile = "Dockerfile"

[deploy]
  # Migrations run once per release in a temporary VM (with the app's secrets),
  # before new machines take traffic. Mirrors the compose "migrate" service.
  # NOTE: needs DATABASE_URL in the `postgresql+asyncpg://` form — see the
  # runbook; Fly Postgres attach sets a bare `postgres://` URL, which the app
  # and alembic cannot use.
  release_command = "alembic upgrade head"
  strategy = "rolling"

[processes]
  web = "uvicorn sentinel.interface.main:app --host 0.0.0.0 --port 8080"
  worker = "python -m sentinel.infrastructure.scheduler"

# Public HTTP is served by the web process only; the worker has no service.
[http_service]
  internal_port = 8080
  force_https = true
  # A monitoring dashboard should stay responsive (and holds long-lived SSE
  # connections), so don't scale the web machine to zero.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["web"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["worker"]
