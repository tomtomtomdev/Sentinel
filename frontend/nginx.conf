# Sentinel SPA served by nginx, with /api reverse-proxied to the backend so the
# whole app is a single origin (no CORS; the S9a Bearer token never hits a URL).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static bundle with client-side-routing fallback (React Router deep links).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + SSE → the backend "web" service. Resolve the name at request time via
    # Docker's embedded DNS (127.0.0.11) and hold the target in a variable, so
    # nginx starts even if "web" isn't up yet and follows it across restarts.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $sentinel_backend "web:8000";
        proxy_pass http://$sentinel_backend$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events (S12.3 GET /api/v1/events): stream, never buffer.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}
